name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout (retry on transient ref race)
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/checkout@v4
          attempt_limit: 5
          attempt_delay: 15000

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (retry on PyPI flakes)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            python -m pip install --upgrade pip
            pip install -e ".[test]"

      - name: Lint (ruff)
        run: |
          python -m ruff check src tests

      - name: Type check (mypy --strict)
        run: |
          python -m mypy

      - name: Import smoke test
        run: |
          python -c "from anonymize_mcp.server import mcp, anonymize, extract_entities, analyze_morphology, check_readability; print('OK, version:', __import__('anonymize_mcp').__version__)"

      - name: Run test suite (offline — PII anonymization core) + coverage
        run: |
          python -m pytest -m "not network" --cov=anonymize_mcp --cov-report=term-missing --cov-fail-under=35 -q
        # Network-marked tests call the live LINDAT/ÚFAL API and are run locally,
        # not in CI (external dependency would make CI flaky). The offline suite
        # covers the regex/MasKIT leak-detection patterns — the security core.

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Upload artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
